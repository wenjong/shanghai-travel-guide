<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上海自由行手冊</title>
  <style>
    /* PDF 手冊 Wix 自然風格樣式 (全寬閱讀優化版) */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #ffffff;
      color: #2d312e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      padding: 3rem 4rem;
      max-width: 800px;
      margin: 0 auto;
    }

    /* 手冊封面頭部 */
    .pdf-header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px solid #e5dfd3;
    }

    .pdf-title {
      font-family: Georgia, serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: #1b3024; /* 深森林綠 */
      margin-bottom: 0.5rem;
    }

    .pdf-subtitle {
      font-size: 0.9rem;
      color: #6b7280;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* 橫排手冊總目錄卡片 (僅在首頁顯示一次) */
    .pdf-toc {
      background-color: #1b3024 !important; /* 森林綠背景 */
      border-radius: 8px;
      padding: 1.5rem 2rem;
      margin: 2rem 0 3rem 0;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      page-break-inside: avoid; /* 避免目錄卡片被截斷 */
    }

    .toc-title {
      font-family: Georgia, serif;
      font-size: 0.85rem;
      color: #8b9d90;
      margin-bottom: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .pdf-toc nav {
      display: flex;
      flex-wrap: wrap; /* 自動折行 */
      gap: 0.65rem;
    }

    .pdf-toc nav a {
      color: #eae6df;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 0.5rem 0.85rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s ease;
    }

    .pdf-toc nav a:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: #e2a85c;
    }

    /* 頁面分頁樣式 */
    .page-section {
      margin-bottom: 4rem;
      padding-bottom: 2rem;
      /* 確保在列印成 PDF 時，每個主題皆獨立分頁 */
      page-break-before: always;
      break-before: page;
    }

    /* 第一頁不需要強制分頁 */
    .page-section:first-child {
      page-break-before: avoid;
      break-before: avoid;
    }

    /* Markdown 元素美化 */
    h1 {
      font-family: Georgia, serif;
      font-size: 2.2rem;
      font-weight: 600;
      margin-bottom: 1.75rem;
      color: #1b3024;
      border-bottom: 1px solid #e5dfd3;
      padding-bottom: 0.75rem;
      margin-top: 1.5rem;
    }

    h2 {
      font-family: Georgia, serif;
      font-size: 1.6rem;
      font-weight: 600;
      margin-top: 2.5rem;
      margin-bottom: 1.2rem;
      color: #1b3024;
    }

    h3 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-top: 1.75rem;
      margin-bottom: 0.75rem;
      color: #2d312e;
    }

    p {
      margin-bottom: 1.3rem;
      color: #374151;
      font-size: 1.1rem;
      text-align: justify;
    }

    ul, ol {
      margin-left: 2rem;
      margin-bottom: 1.3rem;
      color: #374151;
      font-size: 1.1rem;
    }

    li {
      margin-bottom: 0.5rem;
    }

    a {
      color: #0d9488;
      text-decoration: none;
      font-weight: 600;
    }

    /* 表格樣式優化 */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 2rem 0;
      font-size: 1rem;
      page-break-inside: avoid;
    }

    th, td {
      border: 1px solid #e5dfd3;
      padding: 0.9rem 1.2rem;
      text-align: left;
    }

    th {
      background-color: #fcfbfa;
      color: #1b3024;
      font-weight: 700;
      font-family: Georgia, serif;
    }

    tr:nth-child(even) {
      background-color: #fbfbf9;
    }

    /* 溫馨提示警告方塊 */
    blockquote {
      background: #fdfaf2;
      border-left: 4px solid #c2410c;
      padding: 1.25rem 1.75rem;
      border-radius: 0 6px 6px 0;
      margin: 1.75rem 0;
      page-break-inside: avoid;
    }

    blockquote p {
      margin-bottom: 0;
      color: #374151;
      font-weight: 500;
    }

    /* 程式碼與結構樹 */
    pre {
      background: #fdfdfd;
      border: 1px solid #e5dfd3;
      border-radius: 6px;
      padding: 1.25rem;
      overflow-x: auto;
      margin: 1.75rem 0;
      page-break-inside: avoid;
    }

    code {
      font-family: Consolas, Monaco, monospace;
      font-size: 0.95rem;
      color: #c2410c;
      background: #fff8f5;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      border: 1px solid #fce8e1;
    }

    pre code {
      color: #374151;
      background: none;
      padding: 0;
      border: none;
    }

    /* 大圖卡片與圓角 (自然風景美學) */
    img {
      display: block;
      width: 100%;
      max-height: 450px;
      object-fit: cover;
      border-radius: 8px;
      margin: 2rem 0;
      box-shadow: 0 4px 16px rgba(27, 48, 36, 0.06);
      border: 1px solid #e5dfd3;
      page-break-inside: avoid;
    }

    /* 頁尾 */
    footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid #e5dfd3;
      text-align: center;
      font-size: 0.85rem;
      color: #6b7280;
      page-break-before: avoid;
    }

    /* 列印特定設定 */
    @media print {
      body {
        padding: 2cm !important;
        max-width: 100% !important;
        background-color: #ffffff !important;
      }
      .pdf-toc {
        background-color: #1b3024 !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      @page {
        margin: 0;
      }
    }
  </style>
</head>
<body>

  <!-- 手冊封面頭部 -->
  <div class="pdf-header">
    <div class="pdf-title">上海自由行手冊</div>
    <div class="pdf-subtitle">2026/07/19 - 07/24 • FAMILY TRAVEL GUIDE</div>
  </div>

  <!-- 橫排手冊總目錄卡片 (只在第一頁顯示一次) -->
  <div class="pdf-toc" id="sidebar">
    <div class="toc-title">手冊目錄 (點擊直接跳轉)</div>
    <nav>
      <a href="#content-index">🏠 首頁與基本資訊</a>
      <a href="#content-00">📋 行行前檢查與避坑</a>
      <a href="#content-01">💳 聯通門號與富邦開戶</a>
      <a href="#content-02">🧭 景點導覽與低步行</a>
      <a href="#content-03">📅 6天5夜活動行程</a>
    </nav>
  </div>

  <!-- 合併內容區 -->
  <main>
    {{content}}
    
    <footer>
      <p>© 2026 上海自駕與科技探索家庭自由行手冊</p>
      <p style="margin-top: 0.25rem; font-size: 0.75rem;">本手冊專為全家離線閱讀優化編排</p>
    </footer>
  </main>

</body>
</html>
